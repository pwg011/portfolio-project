<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Portfolio Website Cover Capture</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 1600px;
        height: 1200px;
        margin: 0;
        overflow: hidden;
        background: #f3f3f1;
      }

      .capture {
        position: relative;
        width: 1600px;
        height: 1200px;
        overflow: hidden;
      }

      iframe {
        position: absolute;
        top: -118px;
        left: -178px;
        width: 1600px;
        height: 1800px;
        border: 0;
        transform: scale(1.23);
        transform-origin: top left;
      }
    </style>
  </head>
  <body>
    <main class="capture" aria-label="Portfolio website cover capture">
      <iframe src="http://localhost:3000/" title="Portfolio homepage"></iframe>
    </main>
  </body>
</html>
