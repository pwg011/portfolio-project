<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contra Cover Preview - Peter-William</title>
    <style>
      :root {
        --background: #f3f3f1;
        --ink: #171717;
        --muted: rgb(23 23 23 / 58%);
        --line: rgb(68 71 72 / 22%);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 24px;
        background: #deded9;
        color: var(--ink);
      }

      .preview-frame {
        width: min(calc(100vw - 48px), calc((100vh - 48px) * 4 / 3));
        aspect-ratio: 4 / 3;
        box-shadow: 0 28px 70px rgb(23 23 23 / 16%);
      }

      .cover {
        position: relative;
        display: grid;
        width: 100%;
        height: 100%;
        overflow: hidden;
        place-items: center;
        background: var(--background);
      }

      .cover::before {
        position: absolute;
        top: 16%;
        right: 12%;
        left: 12%;
        height: 1px;
        background: var(--line);
        content: "";
      }

      .cover::after {
        position: absolute;
        right: 12%;
        bottom: 14%;
        left: 12%;
        height: 1px;
        background: var(--line);
        content: "";
      }

      .content {
        width: 76%;
        padding-bottom: 3.5%;
      }

      .label {
        margin: 0 0 3.2%;
        color: var(--muted);
        font-family:
          "Hanken Grotesk",
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        font-size: clamp(13px, 1.5vw, 48px);
        font-weight: 600;
        line-height: 1;
        letter-spacing: 0.24em;
        text-transform: uppercase;
      }

      h1 {
        max-width: 10.6em;
        margin: 0;
        font-family:
          "Bodoni Moda",
          "Bodoni 72",
          Didot,
          "Times New Roman",
          serif;
        font-size: clamp(54px, 7.6vw, 244px);
        font-weight: 500;
        line-height: 0.92;
        letter-spacing: -0.045em;
      }

      .description {
        max-width: 16.5em;
        margin: 4.8% 0 0;
        color: rgb(23 23 23 / 74%);
        font-family:
          "Hanken Grotesk",
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        font-size: clamp(18px, 2.25vw, 72px);
        font-weight: 400;
        line-height: 1.22;
      }

      @media (max-width: 700px) {
        body {
          padding: 16px;
        }

        .preview-frame {
          width: min(calc(100vw - 32px), calc((100vh - 32px) * 4 / 3));
        }
      }
    </style>
  </head>
  <body>
    <main class="preview-frame" aria-label="Contra cover preview">
      <section class="cover">
        <div class="content">
          <p class="label">WEB DEVELOPER</p>
          <h1>PETER-WILLIAM</h1>
          <p class="description">Websites, web applications, and automation.</p>
        </div>
      </section>
    </main>
  </body>
</html>
